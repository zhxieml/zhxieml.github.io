<!DOCTYPE html>
<html>
  <head>
      <meta charset="utf-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
      <title>Zhihui Xie | {{ page.subtitle }}</title>
      <meta name="viewport" content="width=device-width">

      <!-- syntax highlighting CSS -->
      <link rel="stylesheet" href="/css/syntax.css">

      <!-- Custom CSS -->
      <link rel="stylesheet" href="/css/main.css">

      <!-- Responsive CSS -->
      <link rel="stylesheet" href="/css/responsive.css">

      <!-- Google Fonts -->
      <link href='http://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,700' rel='stylesheet' type='text/css'>
      <link href='http://fonts.googleapis.com/css?family=Raleway:300,400,700' rel='stylesheet' type='text/css'>
  </head>
  <body>
    <div class="site">
      <div class="sidebar" id="sidebar">
        <div class="header">
          <h1 class="title"><a href="/"><img id="logo" src="/assets/images/avatar.jpg"></a></h1>
          <span class="tagline">
            <a href="{{ site.url }}/Valentines" class="footer-link">积极</a>避世
          </span>
        </div>
        <div id="search-container">
          <input type="text" id="search-input" placeholder="搜索标题，日期...">
          <ul id="results-container"></ul>
        </div>
        <div class="posts">
          <ul class="posts-list">
            {% for post in site.posts %}
              {% if post.visible %}
                <li class="post-link">
                  <a class="post-title" href="{{ post.url }}">
                    <span class="post-date">{{ post.date | date_to_string }}</span>
                    {{ post.title }}
                  </a>
                </li>
              {% endif %}
            {% endfor %}
          </ul>
        </div>
        <div class="footer">
          <span id="footer-links">
            <a href="{{ site.url }}" class="footer-link">About</a> <span class="separator">&bull;</span>
            <a href="https://scholar.google.com/citations?user=Jml8NvkAAAAJ" class="footer-link">Google Scholar</a> <span class="separator">&bull;</span>
            <a href="https://github.com/fffffarmer" class="footer-link">GitHub</a>
          </span>
        </div>
      </div>

        {{ content }}

    </div>

    <!-- Responsive -->
    <script src="/scripts/responsive.js" type="text/javascript"></script>

    <!-- simple-jekyll-search -->
    <script src="/scripts/simple-jekyll-search.min.js"></script>

    <script>
      window.simpleJekyllSearch = new SimpleJekyllSearch({
        searchInput: document.getElementById('search-input'),
        resultsContainer: document.getElementById('results-container'),
        json: '{{ site.baseurl }}/search.json',
        searchResultTemplate: '<li><a href="{{ site.url }}{url}" title="{date}">{title}</a></li>',
        noResultsText: '无结果',
        limit: 10,
        fuzzy: false,
        exclude: ['Welcome']
      })
    </script>

    {% include google-analytics.html %}
  </body>
</html>
